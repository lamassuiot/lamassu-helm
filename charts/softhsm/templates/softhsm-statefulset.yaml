apiVersion: apps/v1
kind: StatefulSet
metadata:  
  name: {{ include "soft.fullname" . }}
  namespace: {{.Release.Namespace}}
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: {{ include "soft.fullname" . }}
spec:
  replicas: 1
  serviceName: {{ include "soft.fullname" . }}
  selector:
    matchLabels:
      app: {{ include "soft.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "soft.fullname" . }}
    spec:
      containers:
        - name: softhsm-v2
          image: {{ .Values.image }}
          imagePullPolicy: {{ default "Always" (get (default (dict) (get .Values "global")) "imagePullPolicy") | quote }}
          ports:
            - containerPort: 5657
            - containerPort: 22
          # sshd starts before token initialization and p11-kit server startup.
          # Do not let Helm/Kubernetes consider SoftHSM ready until the server
          # socket exists, otherwise KMS can start before the token is visible.
          readinessProbe:
            exec:
              command: ["test", "-S", "/run/p11-kit/pkcs11"]
            initialDelaySeconds: 1
            periodSeconds: 2
          env:
            - name: LABEL
              value: "{{ .Values.softhsm.label }}"
            - name: PIN
              value: {{ required "softhsm.pin is required and must not be empty" .Values.softhsm.pin | quote }}
            - name: SO_PIN
              value: {{ required "softhsm.so_pin is required and must not be empty" .Values.softhsm.so_pin | quote }}
            - name: SLOT
              value: "{{ .Values.softhsm.slot }}"
            - name: CONNECTION_PROTOCOL
              value: "tcp"
            {{- if .Values.ssh.authorizedKeys }}
            - name: SSH_AUTHORIZED_KEYS
              value: {{ .Values.ssh.authorizedKeys | quote }}
            {{- end }}
          volumeMounts:
            - name: softhsm-v2-data
              mountPath: /softhsm/tokens
            - name: pkcs11-tls-psk
              mountPath: /sym.psk
              subPath: key.psk
      restartPolicy: Always
      volumes:
        - name: pkcs11-tls-psk
          secret:
            secretName: "{{ include "soft.fullname" . }}-psk"
  volumeClaimTemplates:
  - metadata:
      name: softhsm-v2-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: null
      resources:
        requests:
          storage: 2Gi
