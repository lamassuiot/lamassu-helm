{{- $hasFilesystemEngine := include "kms.hasFilesystemEngine" . | eq "true" -}}
{{- $kms := include "lamassu.svc.merged" (dict "root" $ "svcKey" "kms") | fromYaml -}}
{{- $kmsPodSecurityContext := deepCopy ($kms.podSecurityContext | default dict) -}}
{{- if and .Values.services.kms.pkcs11Sidecar.enabled (not (hasKey $kmsPodSecurityContext "fsGroup")) -}}
{{- $_ := set $kmsPodSecurityContext "fsGroup" 0 -}}
{{- end -}}

{{- if and $hasFilesystemEngine (gt (int $kms.replicaCount) 1) -}}
  {{ fail "KMS replicaCount > 1 is not supported with the filesystem crypto engine. Switch to an external engine (hashicorp_vault, aws_kms, aws_secrets_manager, pkcs11) to enable multiple replicas." }}
{{- end -}}

{{- if and $hasFilesystemEngine $kms.autoscaling.enabled -}}
  {{ fail "KMS autoscaling is not supported with the filesystem crypto engine. Switch to an external engine to enable autoscaling." }}
{{- end -}}

{{- if and .Values.services.kms.pkcs11Sidecar.enabled (not (semverCompare ">=1.29.0-0" .Capabilities.KubeVersion.Version)) -}}
  {{ fail (printf "services.kms.pkcs11Sidecar.enabled=true requires Kubernetes 1.29 or newer because restartPolicy: Always on init containers uses native sidecar semantics (detected %s)" .Capabilities.KubeVersion.Version) }}
{{- end -}}

{{- if and .Values.services.kms.pkcs11Sidecar.enabled (empty .Values.services.kms.pkcs11Sidecar.image) -}}
  {{ fail "services.kms.pkcs11Sidecar.image is required when services.kms.pkcs11Sidecar.enabled=true" }}
{{- end -}}
{{- range .Values.services.kms.pkcs11Modules -}}
{{- if empty (.image | default "") -}}
  {{ fail "each services.kms.pkcs11Modules entry requires an image" }}
{{- end -}}
{{- end -}}
{{ include "lamassu.workload" (dict
  "root" $
  "name" "kms"
  "svcKey" "kms"
  "kind" (ternary "StatefulSet" "Deployment" $hasFilesystemEngine)
  "serviceName" (ternary "kms" "" $hasFilesystemEngine)
  "podSecurityContext" $kmsPodSecurityContext
  "env" (include "lamassu.kms.extraEnv" $)
  "initContainers" (include "lamassu.kms.initContainers" $)
  "volumeMounts" (include "lamassu.kms.volumeMounts" $)
  "volumes" (include "lamassu.kms.volumes" $)
  "volumeClaimTemplates" (ternary (include "lamassu.kms.volumeClaimTemplates" $) "" $hasFilesystemEngine)) }}
