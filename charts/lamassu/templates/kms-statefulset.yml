{{- define "lamassu.kms.extraEnv" -}}
{{- range .Values.services.kms.cryptoEngines.engines }}
{{- if eq .type "pkcs11" }}
{{- range $key, $value := (dig "module_extra_options" "env" dict .) }}
- name: {{ $key }}
  value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end -}}

{{- define "lamassu.kms.volumeClaimTemplates" -}}
# Filesystem engine is configured, using PVC for persistent storage
- metadata:
    name: golang-engine-storage
  spec:
    accessModes: [ "ReadWriteOnce" ]
    storageClassName: null
    resources:
      requests:
        storage: 1Gi
{{- end -}}

{{- $hasFilesystemEngine := include "kms.hasFilesystemEngine" . | eq "true" -}}
{{- $kms := include "lamassu.svc.merged" (dict "root" $ "svcKey" "kms") | fromYaml -}}
{{- if and $hasFilesystemEngine (gt (int $kms.replicaCount) 1) -}}
  {{ fail "KMS replicaCount > 1 is not supported with the filesystem crypto engine. Switch to an external engine (hashicorp_vault, aws_kms, aws_secrets_manager, pkcs11) to enable multiple replicas." }}
{{- end -}}
{{- if and $hasFilesystemEngine $kms.autoscaling.enabled -}}
  {{ fail "KMS autoscaling is not supported with the filesystem crypto engine. Switch to an external engine to enable autoscaling." }}
{{- end -}}
{{ include "lamassu.workload" (dict
  "root" $
  "name" "kms"
  "svcKey" "kms"
  "kind" (ternary "StatefulSet" "Deployment" $hasFilesystemEngine)
  "serviceName" (ternary "kms" "" $hasFilesystemEngine)
  "env" (include "lamassu.kms.extraEnv" $)
  "volumeMounts" (ternary "- name: golang-engine-storage\n  mountPath: /crypto/fs" "" $hasFilesystemEngine)
  "volumeClaimTemplates" (ternary (include "lamassu.kms.volumeClaimTemplates" $) "" $hasFilesystemEngine)) }}
