apiVersion: apps/v1
kind: StatefulSet
metadata:  
  name: va
  namespace: {{.Release.Namespace}}
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: va
spec:
  {{- if not .Values.services.va.autoscaling.enabled }}
  replicas: {{ .Values.services.va.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: va
  template:
    metadata:
      labels:
        app: va
    spec:     
      containers:
        - name: va
          image: {{.Values.services.va.image}}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          tty: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 3
            periodSeconds: 3
          env:
            - name: TMPDIR
              value: /data/crl
          volumeMounts:
            - name: api-config
              mountPath: /etc/lamassuiot/config.yml
              subPath: config
            - name: local-crl-file-storage
              mountPath: /data/crl
          ports:
            - containerPort: 8085
      restartPolicy: Always
      {{- if .Values.services.va.affinity }}
      affinity:
        {{- toYaml .Values.services.va.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: va
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if .Values.services.va.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.services.va.topologySpreadConstraints | nindent 8 }}
      {{- else }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: va
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: va
      {{- end }}
      volumes:
        - name: api-config
          configMap:  
            name: va-config
  volumeClaimTemplates:
  # If no FileSystem engine is defined, the PVC wont be used
  - metadata:
      name: local-crl-file-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: null
      resources:
        requests:
          storage: 1Gi
