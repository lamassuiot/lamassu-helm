kind: ConfigMap
apiVersion: v1
metadata:
  name: alerts-config
  namespace: {{.Release.Namespace}}
data:
  config: |
    logs:
      level: "debug"

    server:
      log_level: "debug"
      health_check: false
      listen_address: "0.0.0.0"
      port: 8085
      protocol: "http" #http | https

    openapi:
      enabled: true

    subscriber_event_bus:
      log_level: "debug"
      enabled: true
      provider: amqp
      protocol: amqp #amqp | amqps
      hostname: {{ .Values.amqp.hostname }}
      port: {{ .Values.amqp.port }}
      basic_auth:
        enabled: true
        username: "{{ .Values.amqp.username }}"
        password: "{{ .Values.amqp.password }}"

    subscriber_dlq_event_bus:
      log_level: "debug"
      enabled: true
      provider: amqp
      protocol: amqp #amqp | amqps
      hostname: {{ .Values.amqp.hostname }}
      port: {{ .Values.amqp.port }}
      exchange: lamassu-dlq
      basic_auth:
        enabled: true
        username: "{{ .Values.amqp.username }}"
        password: "{{ .Values.amqp.password }}"

    storage:
      log_level: "info"
      provider: "postgres" #couch_db | postgres | dynamo_db
      hostname: {{ $.Values.postgres.hostname }}
      port: {{ $.Values.postgres.port }}
      username: "{{ $.Values.postgres.username }}"
      password: "{{ $.Values.postgres.password }}"
    
    smtp_server:
      from: {{ .Values.services.alerts.smtp_server.from }}
      host: {{ .Values.services.alerts.smtp_server.host }}
      port: {{ .Values.services.alerts.smtp_server.port }}
      username: {{ .Values.services.alerts.smtp_server.username }}
      password: {{ .Values.services.alerts.smtp_server.password }}
      ssl: {{ .Values.services.alerts.smtp_server.ssl }}
      insecure: {{ .Values.services.alerts.smtp_server.insecure }}
{{ if .Values.observability.enabled }}
    otel:
      traces:
        enabled: true
        hostname: {{ .Values.observability.traces.hostname }}
        port: {{ .Values.observability.traces.port }}
        scheme: {{ .Values.observability.traces.scheme }}
        base_path: "{{ .Values.observability.traces.basePath }}"
      logging:
        enabled: true
        hostname: {{ .Values.observability.logs.hostname }}
        port: {{ .Values.observability.logs.port }}
        scheme: {{ .Values.observability.logs.scheme }}
        base_path: "{{ .Values.observability.logs.basePath }}"
      metrics:
        enabled: false
{{ end }}