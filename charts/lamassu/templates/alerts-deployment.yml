apiVersion: apps/v1
kind: Deployment
metadata:  
  name: alerts
  namespace: {{.Release.Namespace}}
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: alerts
spec:
  {{- if not .Values.services.alerts.autoscaling.enabled }}
  replicas: {{ .Values.services.alerts.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: alerts
  template:
    metadata:
      labels:
        app: alerts
    spec:
      containers:
        - name: alerts
          image: {{ .Values.services.alerts.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          tty: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 3
            periodSeconds: 3
          volumeMounts:
            - name: api-config
              mountPath: /etc/lamassuiot/config.yml
              subPath: config
          ports:
            - containerPort: 8085
      restartPolicy: Always
      {{- if .Values.services.alerts.affinity }}
      affinity:
        {{- toYaml .Values.services.alerts.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: alerts
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if .Values.services.alerts.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.services.alerts.topologySpreadConstraints | nindent 8 }}
      {{- else }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: alerts
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: alerts
      {{- end }}
      volumes:
        - name: api-config
          configMap:  
            name: alerts-config

