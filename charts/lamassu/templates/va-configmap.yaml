kind: ConfigMap
apiVersion: v1
metadata:
  name: va-config
  namespace: {{.Release.Namespace}}
data:
  config: |
    logs:
      level: "info" #info | debug | trace | none

    server:
      log_level: "debug"
      listen_address: "0.0.0.0"
      port: 8085
      protocol: "http" #http | https

    openapi:
      enabled: true
   
    filesystem_storage:
      id: "{{ .Values.services.va.fileStore.id }}"
      type: "{{ .Values.services.va.fileStore.type }}"
      storage_directory: "{{ .Values.services.va.fileStore.storageDirectory }}"
    
    crl_monitoring_job:
      enabled: true
      frequency: "{{ .Values.services.va.job.crl.frequency }}"

    va_domains:
    {{ range $.Values.services.ca.domains }}
      - "{{ . }}/api/va"
    {{ end }}

    subscriber_event_bus:
      log_level: "debug"
      enabled: true
      provider: amqp
      protocol: amqp #amqp | amqps
      hostname: {{ .Values.amqp.hostname }}
      port: {{ .Values.amqp.port }}
      basic_auth:
        enabled: true
        username: "{{ .Values.amqp.username }}"
        password: "{{ .Values.amqp.password }}"
        
    subscriber_dlq_event_bus:
      log_level: "debug"
      enabled: true
      provider: amqp
      protocol: amqp #amqp | amqps
      hostname: {{ .Values.amqp.hostname }}
      port: {{ .Values.amqp.port }}
      exchange: lamassu-dlq
      basic_auth:
        enabled: true
        username: "{{ .Values.amqp.username }}"
        password: "{{ .Values.amqp.password }}"

    publisher_event_bus:
      log_level: "debug"
      enabled: true
      provider: amqp
      protocol: amqp #amqp | amqps
      hostname: {{ .Values.amqp.hostname }}
      port: {{ .Values.amqp.port }}
      basic_auth:
        enabled: true
        username: "{{ .Values.amqp.username }}"
        password: "{{ .Values.amqp.password }}"

    storage:
      log_level: "{{ $.Values.postgres.logLevel }}"
      provider: "postgres" 
      hostname: {{ $.Values.postgres.hostname }}
      port: {{ $.Values.postgres.port }}
      username: "{{ $.Values.postgres.username }}"
      password: "{{ $.Values.postgres.password }}"

    kms_client:
      log_level: debug
      auth_mode: noauth
      protocol: http
      hostname: kms
      port: 8085
    
    ca_client:
      log_level: debug
      auth_mode: "noauth"
      protocol: "http"
      hostname: "ca"
      port: 8085
{{ if .Values.observability.enabled }}
    otel:
      traces:
        enabled: true
        hostname: {{ .Values.observability.traces.hostname }}
        port: {{ .Values.observability.traces.port }}
        scheme: {{ .Values.observability.traces.scheme }}
        base_path: "{{ .Values.observability.traces.basePath }}"
      logging:
        enabled: true
        hostname: {{ .Values.observability.logs.hostname }}
        port: {{ .Values.observability.logs.port }}
        scheme: {{ .Values.observability.logs.scheme }}
        base_path: "{{ .Values.observability.logs.basePath }}"
      metrics:
        enabled: false
{{ end }}

    authz_client:
      log_level: debug
      auth_mode: noauth
      protocol: http
      hostname: authz
      port: 8085
      http_client:
        log_level: debug
        auth_mode: noauth
        http_connection:
          protocol: http
          basic_connection:
            hostname: authz
            port: 8085
