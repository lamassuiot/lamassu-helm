{{- if and .Values.services.wfx.enabled .Values.services.wfx.routing.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: api-wfx-sbi
  namespace: {{ .Release.Namespace }}
  labels:
    auth: "external"
spec:
  parentRefs:
    - name: eg
      sectionName: https  # The specific listener
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: {{ .Values.services.wfx.routing.sbiPath }}
      filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: {{ .Values.services.wfx.routing.rewritePath | quote }}
      backendRefs:
        - name: wfx
          port: {{ .Values.services.wfx.clientPort }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: api-wfx-nbi
  namespace: {{ .Release.Namespace }}
  labels:
    auth: "external"
spec:
  parentRefs:
    - name: eg
      sectionName: https  # The specific listener
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: {{ .Values.services.wfx.routing.nbiPath }}
      filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: {{ .Values.services.wfx.routing.rewritePath | quote }}
      backendRefs:
        - name: wfx
          port: {{ .Values.services.wfx.managementPort }}
{{- end }}
