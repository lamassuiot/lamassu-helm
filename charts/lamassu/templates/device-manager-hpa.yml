{{- if .Values.services.deviceManager.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: device-manager
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: device-manager
  minReplicas: {{ .Values.services.deviceManager.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.services.deviceManager.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.services.deviceManager.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.deviceManager.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.services.deviceManager.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.deviceManager.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
