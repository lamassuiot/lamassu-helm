{{- if gt (int (ternary .Values.services.ui.autoscaling.minReplicas .Values.services.ui.replicaCount .Values.services.ui.autoscaling.enabled)) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ui
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ui
{{- end }}
