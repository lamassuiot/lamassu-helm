global:
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  imagePullPolicy: Always
# Downstream TLS (API Gateway)
tls:
  # -- TLS certificate provider to use for the API Gateway. Allowed values are: `certManager`, `external`
  type: certManager
  certManagerOptions:
    # -- CertManager ClusterIssuer to use to sign the certificate for the API Gateway.
    clusterIssuer: ""
    # -- CertManager Issuer to use to sign the certificate for the API Gateway. Ignored if `clusterIssuer` is set. If left empty, a self signed certificate will be used.
    issuer: ""
    # -- Duration for the certificate to be valid
    certSpec:
      commonName: "dev.lamassu.io"
      hostnames:
        - "dev.lamassu.io"
      addresses:
      # -- 2160h == 90days
      duration: "2160h"
  externalOptions:
    # -- Secret name for the TLS certificate to be used for the API Gateway (the secret at least must have `tls.crt` and `tls.key` keys)
    secretName: ""
gateway:
  extraRouting:
  addresses:
  ports:
    http: 80
    https: 443
postgres:
  # -- Hostname for the PostgreSQL server
  hostname: ""
  # -- Port for the PostgreSQL server
  port: 5432
  # -- Username to be used to authenticate with the PostgreSQL server
  username: ""
  # -- Password to be used to authenticate with the PostgreSQL server
  password: ""
amqp:
  # -- Hostname for the AMQP server
  hostname: ""
  # -- Port for the AMQP server
  port: 5672
  # -- Username to be used to authenticate with the AMQP server
  username: ""
  # -- Password to be used to authenticate with the AMQP server
  password: ""
  # -- Enable AMQP over TLS (aka AMPQS)
  tls: false
observability:
  # -- Enable OpenTelemetry instrumentation for all Lamassu services
  enabled: false
  # -- HTTP routes for the observability UIs exposed through the API Gateway
  routes:
    logs:
      # -- Path prefix at which Victoria Logs UI is exposed through the gateway
      path: /infra/logs
      # -- Backend service for the Victoria Logs UI (vmui)
      hostname: "victoria-logs"
      # -- Backend port for the Victoria Logs UI
      port: 9428
    traces:
      # -- Path prefix at which VictoriaTraces UI is exposed through the gateway
      path: /infra/traces
      # -- Backend service for the VictoriaTraces UI (vmui)
      hostname: "victoria-traces"
      # -- Backend port for the VictoriaTraces UI
      port: 10428
    jaeger:
      # -- Path prefix at which the Jaeger UI is exposed through the gateway (must match the Jaeger query base_path)
      path: /infra/jaeger
      # -- Backend service for the Jaeger query UI
      hostname: "jaeger"
      # -- Backend port for the Jaeger query UI
      port: 16686
  traces:
    # -- Hostname of the OTLP HTTP collector that fans out traces to Jaeger and VictoriaTraces (deployed by --otel fastlane flag)
    hostname: "otel-collector"
    # -- OTLP HTTP port exposed by the OTel Collector
    port: 4318
    # -- Scheme for the OTLP traces endpoint (http | https)
    scheme: http
    # -- Base path for the OTLP traces ingestion endpoint (empty = standard /v1/traces)
    basePath: ""
  logs:
    # -- Hostname of the Victoria Logs OTLP HTTP endpoint (deployed by --otel fastlane flag)
    hostname: "victoria-logs"
    # -- OTLP HTTP port exposed by Victoria Logs
    port: 9428
    # -- Scheme for the Victoria Logs OTLP endpoint (http | https)
    scheme: http
    # -- Base path for the Victoria Logs OTLP log ingestion endpoint
    basePath: "/insert/opentelemetry/v1/logs"
auth:
  oidc:
    frontend:
      # -- Client ID to be used as the OIDC client for the frontend
      clientId: "frontend"
      # -- URL pointing to the OIDC provider's base path to build the OIDC well-known URL (This is the complete URL preceding the "/.well-known/openid-configuration" URL). Can be a JS expression
      authority: https://${window.location.host}/auth/realms/lamassu
    apiGateway:
      # -- URL pointing to the issuer's public key set to validate the JWT tokens.
      jwks:
        - name: oidc-authn
          # -- URI to use to fetch the public key set
          uri: http://keycloak/auth/realms/lamassu/protocol/openid-connect/certs
  authorization:
    # -- Claim to use to find and filter the user's roles
    rolesClaim: realm_access.roles
    roles:
      # -- Role association to be used to authorize the user as LAMASSU's admin
      admin: pki-admin
services:
  ui:
    # -- Docker image for the UI component
    image: "ghcr.io/lamassuiot/lamassu-ui:4.3.0"
    # -- Number of UI replicas
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  va:
    # -- Docker image for the VA component
    image: ghcr.io/lamassuiot/lamassu-va:3.8.0
    # -- Number of VA replicas. Must be 1 when fileStore.type is "local" (ReadWriteOnce PVC).
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    fileStore:
      id: "local-1"
      type: "local"
      storageDirectory: "/data/crl"
    job:
      crl:
        # -- Frequency to launch the CRL computation job
        frequency: "* * * * *"
  ca:
    # -- Domain to be used while signing/generating new CAs and certificates
    domains:
      - dev.lamassu.io
    # -- Docker image for the CA component
    image: ghcr.io/lamassuiot/lamassu-ca:3.8.0
    # -- Number of CA replicas
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    monitoring:
      # -- Frequency to check the CA's health status uses CRON syntax. Can also be specified at a "second" level by adding one extra term
      frequency: "* * * * *"
  kms:
    # -- Docker image for the KMS component
    image: ghcr.io/lamassuiot/lamassu-kms:3.8.0
    # -- Number of KMS replicas. Must be 1 when the filesystem crypto engine is configured (ReadWriteOnce PVC).
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    cryptoEngines:
      # -- Default engine ID to be used for the KMS component
      defaultEngineID: "filesystem-1"
      engines:
        - id: "filesystem-1"
          # filesystem | pkcs11 | hashicorp_vault | aws_kms | aws_secrets_manager
          type: "filesystem"
          metadata:
            prod-ready: "false"
          storage_directory: "/crypto/fs"
  deviceManager:
    # -- Docker image for the Device Manager component
    image: ghcr.io/lamassuiot/lamassu-devmanager:3.8.0
    # -- Number of Device Manager replicas
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  dmsManager:
    # -- Docker image for the DMS Manager component
    image: ghcr.io/lamassuiot/lamassu-dmsmanager:3.8.0
    # -- Number of DMS Manager replicas
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  alerts:
    # -- Docker image for the Alerts component
    image: ghcr.io/lamassuiot/lamassu-alerts:3.8.0
    # -- Number of Alerts replicas
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
    # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
    affinity: {}
    # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
    topologySpreadConstraints: []
    pdb:
      # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
      minAvailable: 1
    # -- Container resource requests and limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    smtp_server:
      # -- email address to use as the sender of the alerts
      from: ""
      # -- skip TLS verification
      insecure: false
      # -- use TLS for the SMTP connection
      enable_ssl: true
      # -- SMTP server username
      username: ""
      # -- SMTP server password
      password: ""
      # -- SMTP server hostname
      host: ""
      # -- SMTP server port
      port: 25
  connectors:
toolbox:
  image: ghcr.io/lamassuiot/toolbox:2.2.0
migrations:
  db:
    image: ghcr.io/lamassuiot/lamassu-lamassu-db-migration:3.8.0
    databases:
      - alerts
      - ca
      - va
      - devicemanager
      - dmsmanager
      - kms
  caToKms:
    # -- Enable the CA-to-KMS key migration pre-upgrade hook. Only needed when upgrading from a version prior to 3.7.0.
    enabled: false
    # -- Docker image for the CA-to-KMS migration tool
    image: ghcr.io/lamassuiot/lamassu-ca-to-kms-migration:3.8.0
