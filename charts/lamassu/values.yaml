global:
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  imagePullPolicy: Always
# Downstream TLS (API Gateway)
tls:
  # -- TLS certificate provider to use for the API Gateway. Allowed values are: `certManager`, `external`
  type: certManager
  certManagerOptions:
    # -- CertManager ClusterIssuer to use to sign the certificate for the API Gateway.
    clusterIssuer: ""
    # -- CertManager Issuer to use to sign the certificate for the API Gateway. Ignored if `clusterIssuer` is set. If left empty, a self signed certificate will be used.
    issuer: ""
    # -- Duration for the certificate to be valid
    certSpec:
      commonName: "dev.lamassu.io"
      hostnames:
        - "dev.lamassu.io"
      addresses:
      # -- 2160h == 90days
      duration: "2160h"
  externalOptions:
    # -- Secret name for the TLS certificate to be used for the API Gateway (the secret at least must have `tls.crt` and `tls.key` keys)
    secretName: ""
gateway:
  extraRouting:
  addresses:
  ports:
    http: 80
    https: 443
  responseOverride:
    # -- Rewrite 401 responses with a custom body
    unauthorized:
      enabled: true
      contentType: application/json
      body: '{"error": "Unauthorized"}'
    # -- Rewrite 403 responses with a custom body
    forbidden:
      enabled: true
      contentType: application/json
      body: '{"error": "Forbidden"}'
postgres:
  # -- Hostname for the PostgreSQL server
  hostname: ""
  # -- Port for the PostgreSQL server
  port: 5432
  # -- Log level used by components that connect to PostgreSQL for their storage layer
  logLevel: "info"
  # -- Username to be used to authenticate with the PostgreSQL server
  username: ""
  # -- Password to be used to authenticate with the PostgreSQL server
  password: ""
amqp:
  # -- Hostname for the AMQP server
  hostname: ""
  # -- Port for the AMQP server
  port: 5672
  # -- Username to be used to authenticate with the AMQP server
  username: ""
  # -- Password to be used to authenticate with the AMQP server
  password: ""
  # -- Enable AMQP over TLS (aka AMPQS)
  tls: false
observability:
  # -- Enable OpenTelemetry instrumentation for all Lamassu services
  enabled: false
  # -- HTTP routes for the observability UIs exposed through the API Gateway
  routes:
    logs:
      # -- Path prefix at which Victoria Logs UI is exposed through the gateway
      path: /infra/logs
      # -- Backend service for the Victoria Logs UI (vmui)
      hostname: "victoria-logs"
      # -- Backend port for the Victoria Logs UI
      port: 9428
    traces:
      # -- Path prefix at which VictoriaTraces UI is exposed through the gateway
      path: /infra/traces
      # -- Backend service for the VictoriaTraces UI (vmui)
      hostname: "victoria-traces"
      # -- Backend port for the VictoriaTraces UI
      port: 10428
    jaeger:
      # -- Path prefix at which the Jaeger UI is exposed through the gateway (must match the Jaeger query base_path)
      path: /infra/jaeger
      # -- Backend service for the Jaeger query UI
      hostname: "jaeger"
      # -- Backend port for the Jaeger query UI
      port: 16686
  traces:
    # -- Hostname of the OTLP HTTP collector that fans out traces to Jaeger and VictoriaTraces (deployed by --otel fastlane flag)
    hostname: "otel-collector"
    # -- OTLP HTTP port exposed by the OTel Collector
    port: 4318
    # -- Scheme for the OTLP traces endpoint (http | https)
    scheme: http
    # -- Base path for the OTLP traces ingestion endpoint (empty = standard /v1/traces)
    basePath: ""
  logs:
    # -- Hostname of the Victoria Logs OTLP HTTP endpoint (deployed by --otel fastlane flag)
    hostname: "victoria-logs"
    # -- OTLP HTTP port exposed by Victoria Logs
    port: 9428
    # -- Scheme for the Victoria Logs OTLP endpoint (http | https)
    scheme: http
    # -- Base path for the Victoria Logs OTLP log ingestion endpoint
    basePath: "/insert/opentelemetry/v1/logs"
auth:
  oidc:
    frontend:
      # -- Client ID to be used as the OIDC client for the frontend
      clientId: "frontend"
      # -- URL pointing to the OIDC provider's base path to build the OIDC well-known URL (This is the complete URL preceding the "/.well-known/openid-configuration" URL). Can be a JS expression
      authority: https://${window.location.host}/auth/realms/lamassu
    apiGateway:
      # -- URL pointing to the issuer's public key set to validate the JWT tokens.
      jwks:
        - name: oidc-authn
          # -- URI to use to fetch the public key set
          uri: http://keycloak/auth/realms/lamassu/protocol/openid-connect/certs
  authorization:
    # -- Claim to use to find and filter the user's roles
    rolesClaim: realm_access.roles
    roles:
      # -- Role association to be used to authorize the user as LAMASSU's admin
      admin: pki-admin
  externalAuthorization:
    # -- Protect routes labeled auth=external with Envoy Gateway external authorization.
    enabled: true
    # -- Kubernetes Service name for the external authorization endpoint.
    serviceName: authz
    # -- Kubernetes Service port for the external authorization endpoint.
    servicePort: 8085
    # -- HTTP path that replaces the original request path for the external authorization check. Requires Envoy Gateway v1.8.0+.
    path: /v1/ext_authz/check
    # -- Allow traffic when the external authorization service cannot be reached.
    failOpen: false
# -- Generic defaults applied to every Lamassu service (ca, kms, va, ui, alerts,
# deviceManager, dmsManager and aws connector instances). Any key here can be
# overridden per service under `services.<name>` — the per-service block is
# deep-merged on top of these defaults. Maps are merged key by key; lists
# (tolerations, topologySpreadConstraints, extraEnv, ...) replace the default
# wholesale.
serviceDefaults:
  # -- HTTP port the service listens on (also used for Service, probes and gateway routes)
  port: 8085
  # -- Number of replicas. Ignored when autoscaling is enabled.
  replicaCount: 1
  # -- Container resource requests/limits. CPU and memory requests are required
  # for utilization-based HPA metrics.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Extra annotations for the Deployment/StatefulSet
  annotations: {}
  # -- Extra labels for the Deployment/StatefulSet and its pods (added next to the `app` label)
  labels: {}
  # -- Extra labels for the pods only
  podLabels: {}
  # -- Extra annotations for the pods
  podAnnotations: {}
  # -- Node selector for pod scheduling
  nodeSelector: {}
  # -- Tolerations for pod scheduling
  tolerations: []
  # -- Image pull secrets for the pods
  imagePullSecrets: []
  # -- Pod-level security context
  podSecurityContext: {}
  # -- Container-level security context
  securityContext: {}
  # -- Extra environment variables for the service container
  extraEnv: []
  probes:
    # -- Path used by the liveness/readiness probes
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 3
  autoscaling:
    # -- Enable a HorizontalPodAutoscaler for the service
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetMemoryUtilizationPercentage: 80
    targetCPUUtilizationPercentage: 80
  # -- Pod affinity override. {} = use chart default (soft node anti-affinity). Provide a full affinity spec to replace it.
  affinity: {}
  # -- Topology spread constraints override. [] = use chart defaults (zone + hostname ScheduleAnyway). Provide a list to replace them.
  topologySpreadConstraints: []
  pdb:
    # -- minAvailable for PodDisruptionBudget. Only active when effective replica count > 1.
    minAvailable: 1
services:
  ui:
    # -- Docker image for the UI component
    image: "ghcr.io/lamassuiot/lamassu-ui:4.3.0"
    port: 80
  va:
    # -- Docker image for the VA component. Replicas must stay at 1 while fileStore.type is "local" (ReadWriteOnce PVC).
    image: ghcr.io/lamassuiot/lamassu-va:3.8.0
    autoscaling:
      maxReplicas: 3
    fileStore:
      # -- Unique identifier for this storage engine instance
      id: "local-1"
      # -- Storage backend type  Allowed values: local | s3
      type: "local"
      # -- Config for type=local. Maps to localfs.FilesystemEngineConfig (storage_directory)
      local:
        storageDirectory: "/data/crl"
      # -- Config for type=s3. Free-form map whose keys map directly to s3.AWSS3FilesystemConfig
      s3:
    job:
      crl:
        # -- Frequency to launch the CRL computation job
        frequency: "0 * * * *"
  ca:
    # -- Domain to be used while signing/generating new CAs and certificates
    domains:
      - dev.lamassu.io
    # -- Docker image for the CA component
    image: ghcr.io/lamassuiot/lamassu-ca:dev
    monitoring:
      # -- Frequency to check the CA's health status uses CRON syntax. Can also be specified at a "second" level by adding one extra term
      frequency: "* * * * *"
  kms:
    # -- Docker image for the KMS component. Replicas must stay at 1 while the filesystem crypto engine is configured (ReadWriteOnce PVC).
    image: ghcr.io/lamassuiot/lamassu-kms:3.8.0
    autoscaling:
      maxReplicas: 3
    cryptoEngines:
      # -- Default engine ID to be used for the KMS component
      defaultEngineID: "filesystem-1"
      engines:
        - id: "filesystem-1"
          # filesystem | pkcs11 | hashicorp_vault | aws_kms | aws_secrets_manager
          type: "filesystem"
          metadata:
            prod-ready: "false"
          storage_directory: "/crypto/fs"
  deviceManager:
    # -- Docker image for the Device Manager component
    image: ghcr.io/lamassuiot/lamassu-devmanager:dev
  dmsManager:
    # -- Docker image for the DMS Manager component
    image: ghcr.io/lamassuiot/lamassu-dmsmanager:dev
  wfx:
    # -- Enable the Siemens WFX workflow service
    enabled: true
    # -- Docker image for the WFX component
    image: ghcr.io/siemens/wfx:latest
    # -- Number of WFX replicas.
    replicas: 1
    # -- WFX southbound/client API port.
    clientPort: 9080
    # -- WFX northbound/management API port.
    managementPort: 9081
    logs:
      # -- WFX log format.
      format: json
      # -- WFX log level.
      level: debug
    postgres:
      # -- PostgreSQL database name for WFX.
      database: wfx
      # -- PostgreSQL SSL mode for WFX.
      sslmode: disable
      iamAuth:
        # -- Enable AWS RDS IAM authentication for PostgreSQL.
        enabled: false
        # -- AWS region used for PostgreSQL IAM authentication.
        region: ""
    routing:
      # -- Expose WFX through the Lamassu Gateway.
      enabled: true
      # -- Gateway path for the WFX southbound/client API.
      sbiPath: /api/wfx/sbi/
      # -- Explicit rewrite path for WFX southbound/client API.
      rewriteSbiPath: /api/wfx/
      # -- Gateway path for the WFX northbound/management API.
      nbiPath: /api/wfx/nbi/
      # -- Explicit rewrite path for WFX northbound/management API.
      rewriteNbiPath: /api/wfx/
      # -- Path used when rewriting Gateway routes to WFX.
      rewritePath: /api/wfx/
    extraEnv: []
    # -- Additional command line arguments for the WFX container.
    extraArgs: []
  alerts:
    # -- Docker image for the Alerts component
    image: ghcr.io/lamassuiot/lamassu-alerts:3.8.0
    autoscaling:
      maxReplicas: 3
    smtp_server:
      # -- email address to use as the sender of the alerts
      from: ""
      # -- skip TLS verification
      insecure: false
      # -- use TLS for the SMTP connection
      enable_ssl: true
      # -- SMTP server username
      username: ""
      # -- SMTP server password
      password: ""
      # -- SMTP server hostname
      host: ""
      # -- SMTP server port
      port: 25
  authz:
    # -- Docker image for the Authz connector component
    image: ghcr.io/lamassuiot/lamassu-authz:dev
    # -- JWKS endpoint used by authz to validate JWTs
    jwkUrl: http://auth-keycloak/auth/realms/lamassu/protocol/openid-connect/certs
    # -- PostgreSQL database name for authz principals, grants, and policies
    database: authz
    # -- Map of schema name to database name for per-schema Postgres credentials. Uses global postgres credentials.
      # e.g. credentials: { pki: { database: pki_db } }
    credentials: {}
    # -- Bootstrap entries: list of {principal_id, principal_name, principal_type, auth_config, policy_ids}
    bootstrap: []
  connectors:
toolbox:
  image: ghcr.io/lamassuiot/toolbox:2.2.0
migrations:
  db:
    image: ghcr.io/lamassuiot/lamassu-lamassu-db-migration:dev
    databases:
      - alerts
      - ca
      - va
      - devicemanager
      - dmsmanager
      - kms
  caToKms:
    # -- Enable the CA-to-KMS key migration pre-upgrade hook. Only needed when upgrading from a version prior to 3.7.0.
    enabled: false
    # -- Docker image for the CA-to-KMS migration tool
    image: ghcr.io/lamassuiot/lamassu-ca-to-kms-migration:dev
