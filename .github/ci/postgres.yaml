# Intended for helm version 0.19.5
fullnameOverride: "postgresql"
image:
  registry: docker.io
  repository: postgres
  tag: "18.4"

auth:
  username: admin
  password: admin


initdb:
  scripts:
    init.sql: |
      CREATE DATABASE auth;
      CREATE DATABASE alerts;
      CREATE DATABASE ca;
      CREATE DATABASE va;
      CREATE DATABASE cloudproxy;
      CREATE DATABASE devicemanager;
      CREATE DATABASE dmsmanager;
      CREATE DATABASE kms;